site_name: Live Trading Strategies — Documentation
site_description: Documentation for the live trading strategies area (Strategy 1 scope)
site_url: https://example.com/
repo_url: https://github.com/OWNER/REPO
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/js/Helmip.png
  favicon: assets/js/Helmip.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: blue grey
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - Home: index.md
  - Repository map:
      - repository/index.md
  - Setup:
      - setup/index.md
      - Virtual environment: setup/venv.md
      - Dependencies: setup/dependencies.md
  - Infrastructure:
      - infrastructure/index.md
      - MongoDB: infrastructure/mongodb.md
      - Studio 3T: infrastructure/studio3t.md
  - Strategy 1:
      - strategy-1/index.md
      - How it works: strategy-1/how-it-works.md
      - Data requirements: strategy-1/data-requirements.md
      - How to run: strategy-1/how-to-run.md
  - Glossary: glossary.md
